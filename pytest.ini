[pytest]
testpaths = .
addopts = -v --tb=short
markers =
    core: Core single-amplicon CRISPResso tests (basic, params, nhej, parallel)
    editor: Prime editor and base editor tests
    asym: Asymmetric quantification window tests
    batch: CRISPRessoBatch tests
    pooled: CRISPRessoPooled tests
    wgs: CRISPRessoWGS tests
    compare: CRISPRessoCompare tests
    aggregate: CRISPRessoAggregate tests
    vcf: VCF output tests
    bam: BAM-related tests
    pro_only: Tests that require CRISPRessoPro
    xdist_group: Assign tests to the same xdist worker
